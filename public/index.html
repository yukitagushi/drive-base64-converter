<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gemini File Search Manager</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Gemini File Search Manager</h1>
      <p>Gemini File Search ストアの作成とドキュメントアップロードを管理します。</p>
    </header>
    <main class="container">
      <section class="panel">
        <h2>認証設定</h2>
        <form id="auth-form" autocomplete="off" class="form-grid">
          <label>
            <span>Bearer Token</span>
            <input id="auth-token" name="authToken" type="password" placeholder="sk-..." autocomplete="off" />
          </label>
          <label>
            <span>ワークスペース</span>
            <input id="auth-office" name="office" type="text" placeholder="tokyo" autocomplete="off" />
          </label>
          <button type="submit">保存</button>
        </form>
        <p id="auth-status" class="status" data-state="idle">未接続</p>
      </section>

      <section class="panel">
        <h2>File Search ストアの作成</h2>
        <form id="store-form" class="form-grid">
          <label>
            <span>表示名</span>
            <input id="store-display-name" name="displayName" type="text" required />
          </label>
          <label>
            <span>説明 (任意)</span>
            <input id="store-description" name="description" type="text" />
          </label>
          <button type="submit">ストアを作成</button>
        </form>
        <p id="store-status" class="status"></p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>登録済みストア</h2>
          <button id="refresh-stores" type="button">再読込</button>
        </div>
        <div class="form-grid">
          <label>
            <span>ストア選択</span>
            <select id="store-select"></select>
          </label>
          <label>
            <span>アップロード用ストア</span>
            <select id="upload-store-select"></select>
          </label>
        </div>
        <div class="store-layout">
          <div>
            <h3>ストア一覧</h3>
            <ul id="store-list" class="store-list" aria-live="polite"></ul>
          </div>
          <div>
            <h3>詳細</h3>
            <dl class="store-details">
              <div>
                <dt>表示名</dt>
                <dd id="detail-display-name">—</dd>
              </div>
              <div>
                <dt>Gemini 名</dt>
                <dd id="detail-gemini-name">—</dd>
              </div>
              <div>
                <dt>説明</dt>
                <dd id="detail-description">—</dd>
              </div>
              <div>
                <dt>作成日時</dt>
                <dd id="detail-created-at">—</dd>
              </div>
            </dl>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>ドキュメントのアップロード</h2>
        <form id="upload-form" class="form-grid" enctype="multipart/form-data">
          <label>
            <span>ファイル</span>
            <input id="upload-file" name="file" type="file" required />
          </label>
          <label>
            <span>メモ (任意)</span>
            <input id="upload-memo" name="memo" type="text" placeholder="用途メモ" />
          </label>
          <button type="submit">アップロード</button>
        </form>
        <p id="upload-status" class="status"></p>
      </section>

      <section class="panel">
        <h2>アクティビティログ</h2>
        <ul id="activity-log" class="activity-log" aria-live="polite"></ul>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
